name: generate animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: aleewains
          outputs: |
            dist/github-contribution-grid-snake.svg?speed=0.3
            dist/github-contribution-grid-snake-dark.svg?speed=0.3&color_snake=#a855f7&color_dots=#1a1b27,#2d2f4a,#3d3f6b,#5a5d9e,#7b7fd4

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
